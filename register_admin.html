<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Admin — Blood Bank</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .login-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 2rem;
            color: var(--text-main);
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.8rem;
            background: var(--bg-main);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: var(--navy-mid);
            transform: translateY(-2px);
        }
        .error-message {
            background: rgba(220, 38, 38, 0.1);
            color: var(--primary);
            padding: 1rem;
            border-radius: 0.8rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
        .success-message {
            background: var(--green-bg);
            color: var(--green);
            padding: 1rem;
            border-radius: 0.8rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
            border: 1px solid #b7dfcc;
        }
        .register-link {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--navy);
            text-decoration: none;
            font-weight: 500;
        }
        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="index.html">
        <span class="drop"><span>🩸</span></span>
        BloodBank
    </a>
    <a href="index.html">Dashboard</a>
    <a href="search.html">Search Donors</a>
    <a href="donors.html">All Donors</a>
    <div id="auth-links" style="display: contents;">
        <a href="login.html">Login</a>
    </div>
</nav>

<main class="page">
    <div class="login-wrapper">
        <div class="login-card card">
            <h2>Register New Admin</h2>
            <br>
            <div id="error-message" class="alert alert-error" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-login">Register Admin</button>

                <a href="login.html" class="register-link">Back to Login</a>
            </form>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('register-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errDiv = document.getElementById('error-message');
        const sucDiv = document.getElementById('success-message');
        
        errDiv.style.display = 'none';
        sucDiv.style.display = 'none';

        const result = registerAdmin(username, password);
        if (result.success) {
            sucDiv.textContent = 'Admin registered successfully. You can now login.';
            sucDiv.style.display = 'block';
            document.getElementById('register-form').reset();
        } else {
            errDiv.textContent = result.message;
            errDiv.style.display = 'block';
        }
    });
});
</script>

</body>
</html>
