<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Donors — Blood Bank</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/db.js"></script>
</head>
<body>

<nav>
    <a class="nav-brand" href="index.html">
        <span class="drop"><span>🩸</span></span>
        BloodBank
    </a>
    <a href="index.html">Dashboard</a>
    <a href="search.html" class="active">Search Donors</a>
    <a href="donors.html">All Donors</a>
    <div id="auth-links" style="display: contents;">
        <!-- Auth links populated by db.js -->
    </div>
</nav>

<main class="page">
    <div class="page-header">
        <h1>Search Donors</h1>
        <p>Find eligible donors by blood group and location</p>
    </div>

    <!-- Search Bar -->
    <div class="card" style="margin-bottom: 2rem;">
        <div class="card-body">
            <form id="search-form" class="search-bar">
                <div class="form-group" style="flex: 1;">
                    <label for="blood_group">Blood Group</label>
                    <select name="blood_group" id="blood_group">
                        <option value="">Any Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 2;">
                    <label for="location">Location (City/Address)</label>
                    <input type="text" name="location" id="location" placeholder="e.g., Downtown">
                </div>
                <button type="submit" class="btn btn-primary" style="height: 46px;">
                    <span class="icon">🔍</span> Search
                </button>
            </form>
        </div>
    </div>

    <!-- Results Table -->
    <div class="card">
        <div class="card-header">
            <h2>Search Results</h2>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Blood Group</th>
                        <th>Phone</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="results-tbody">
                    <tr>
                        <td colspan="6">
                            <div class="empty">
                                <div class="icon">🔍</div>
                                <p>Enter search criteria above to find donors.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('search-form').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const bloodGroup = document.getElementById('blood_group').value;
        const location = document.getElementById('location').value.trim().toLowerCase();
        
        let donors = getDonors();
        
        if (bloodGroup) {
            donors = donors.filter(d => d.blood_group === bloodGroup);
        }
        
        if (location) {
            donors = donors.filter(d => d.address.toLowerCase().includes(location));
        }

        const tbody = document.getElementById('results-tbody');
        
        if (donors.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="empty">
                            <div class="icon">📭</div>
                            <p>No donors found matching your criteria.</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = '';
        const ninetyDaysAgo = new Date();
        ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

        donors.forEach(donor => {
            const donations = getDonationsByDonor(donor.id);
            let isEligible = true;

            if (donations.length > 0) {
                const lastDate = new Date(donations[0].donation_date);
                if (lastDate > ninetyDaysAgo) {
                    isEligible = false;
                }
            }

            let statusBadge = isEligible 
                ? '<span class="badge badge-eligible">Eligible</span>' 
                : '<span class="badge badge-not-eligible">Wait 90 Days</span>';

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight: 600;">${donor.name}</td>
                    <td><span class="badge badge-blood">${donor.blood_group}</span></td>
                    <td>${donor.phone}</td>
                    <td>${donor.address}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <a href="donor_detail.html?id=${donor.id}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
                            View
                        </a>
                    </td>
                </tr>
            `;
        });
    });
});
</script>

</body>
</html>
